<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SYMO – Liquid Glass Control</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-body: #080b16;
      /* Vetro Apple Style: Sfondo semi-trasparente con bordo chiaro */
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      
      --fluo-green: #39ff14;
      --fluo-yellow: #ccff00;
      --fluo-gradient: linear-gradient(135deg, var(--fluo-green) 0%, var(--fluo-yellow) 100%);
      --fluo-glow: 0 0 20px rgba(57, 255, 20, 0.4);

      --text-main: #ffffff;
      --text-muted: #8b9bb4;
      --danger: #ff4d4d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-body);
      /* Gradiente di sfondo per far risaltare l'effetto vetro */
      background-image: radial-gradient(circle at 10% 10%, #1a2344 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, #0d1225 0%, transparent 40%);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .dashboard {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* --- Top Bar --- */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .user-info h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    
    .status-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      padding: 10px 16px;
      border-radius: 20px;
      font-size: 12px;
      border: 1px solid var(--glass-border);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); transition: 0.3s; }
    .dot.ok { background: var(--fluo-green); box-shadow: 0 0 10px var(--fluo-green); }

    /* --- Sezione Sensori Liquid Glass --- */
    .main-stats {
      background: var(--glass-bg);
      backdrop-filter: blur(25px); /* Effetto vetro liquido */
      -webkit-backdrop-filter: blur(25px);
      border-radius: 32px;
      padding: 30px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .main-stats h2 { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
    
    .stats-grid { display: flex; flex-wrap: wrap; gap: 40px; }
    .stat-item .value { font-size: 56px; font-weight: 700; display: flex; align-items: baseline; gap: 6px; letter-spacing: -2px; }
    .stat-item .unit { font-size: 20px; color: var(--text-muted); font-weight: 400; }
    .stat-item .label { font-size: 14px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
    
    .stat-item.fluo-text .value {
      background: var(--fluo-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* --- Devices Grid --- */
    .section-header { margin-bottom: 10px; }
    .section-header h3 { font-size: 20px; font-weight: 600; display: inline-block; position: relative; }
    .section-header h3::after { content: ''; display: block; width: 40%; height: 3px; background: var(--fluo-green); border-radius: 2px; margin-top: 4px; }

    .devices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .device-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--glass-border);
      min-height: 200px;
      transition: transform 0.2s ease;
    }
    .device-card:active { transform: scale(0.98); }

    .device-icon {
      width: 48px; height: 48px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      color: var(--fluo-yellow);
      margin-bottom: 20px;
    }

    .device-info h4 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .device-info p { font-size: 14px; color: var(--text-muted); }

    .device-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto; /* Spinge i controlli in basso */
      padding-top: 20px;
    }
    .device-state { font-size: 14px; font-weight: 700; color: var(--text-muted); }

    /* --- Toggle Ingrandito --- */
    .toggle {
      width: 60px; height: 32px; /* Ingrandito */
      border-radius: 30px;
      background: rgba(255,255,255,0.1);
      position: relative;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid var(--glass-border);
    }
    
    .toggle.on { 
      background: var(--fluo-gradient); 
      box-shadow: var(--fluo-glow);
      border-color: transparent;
    }
    
    .knob {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #ffffff;
      position: absolute;
      top: 3px; left: 4px;
      transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    
    .toggle.on .knob { left: 30px; }

    .meta-footer {
      margin-top: 20px;
      padding: 20px;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      opacity: 0.6;
    }
    code { color: var(--fluo-green); }

    /* Responsività per schermi piccoli */
    @media (max-width: 480px) {
      .stat-item .value { font-size: 44px; }
      .dashboard { gap: 20px; }
    }
  </style>
</head>
<body>

  <div class="dashboard">
    
    <div class="top-bar">
      <div class="user-info">
        <h1>Hello, SYMO</h1>
      </div>
      <div class="status-badge" onclick="connect()">
        <div id="dot" class="dot"></div>
        <span id="connText">Disconnesso</span>
      </div>
    </div>

    <div class="main-stats">
      <h2>Ambiente</h2>
      <div class="stats-grid">
        <div class="stat-item fluo-text">
          <div class="value"><span id="temp">--.-</span> <span class="unit">°C</span></div>
          <div class="label">Temperatura</div>
        </div>
        <div class="stat-item">
          <div class="value"><span id="hum">--.-</span> <span class="unit">%</span></div>
          <div class="label">Umidità</div>
        </div>
      </div>
    </div>

    <div class="section-header">
      <h3>I tuoi Dispositivi</h3>
    </div>

    <div class="devices-grid">
      <div class="device-card">
        <div class="device-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>
        </div>
        <div class="device-info">
          <h4>Lighting</h4>
          <p>Luce Stanza</p>
        </div>
        <div class="device-controls">
          <span class="device-state" id="toggleTxt">OFF</span>
          <div id="toggle" class="toggle">
            <div class="knob"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="meta-footer">
      <div>MQTT: <code>symo/room/data</code></div>
      <div id="lastMsg">Last: —</div>
    </div>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const MQTT_HOST = "ff68867802ae4c19875944cbd0bd6dac.s1.eu.hivemq.cloud"; 
    const MQTT_WS_PORT = 8884; 
    const MQTT_USER = "syymon";  
    const MQTT_PASS = "Piazzale99";
    const TOPIC_DATA  = "symo/room/data";
    const TOPIC_RELAY = "symo/room/relay";

    const elTemp = document.getElementById("temp");
    const elHum  = document.getElementById("hum");
    const elDot  = document.getElementById("dot");
    const elConn = document.getElementById("connText");
    const elLast = document.getElementById("lastMsg");
    const elToggle = document.getElementById("toggle");
    const elToggleTxt = document.getElementById("toggleTxt");

    let client = null;
    let relayState = 0;

    function setConn(ok, msg){
      elDot.classList.toggle("ok", !!ok);
      elConn.textContent = msg;
    }

    function setRelayUI(on){
      relayState = on ? 1 : 0;
      elToggle.classList.toggle("on", !!on);
      elToggleTxt.textContent = on ? "ACCESO" : "SPENTO";
      elToggleTxt.style.color = on ? "var(--fluo-green)" : "var(--text-muted)";
    }

    function connect(){
      if (client) { try { client.end(true); } catch(e){} client = null; }
      const url = `wss://${MQTT_HOST}:${MQTT_WS_PORT}/mqtt`;
      setConn(false, "Connessione...");
      client = mqtt.connect(url, {
        username: MQTT_USER, password: MQTT_PASS,
        clientId: "symo-web-" + Math.random().toString(16).slice(2),
        clean: true, connectTimeout: 8000, reconnectPeriod: 2000, keepalive: 30
      });

      client.on("connect", () => {
        setConn(true, "Connesso");
        client.subscribe(TOPIC_DATA);
      });

      client.on("message", (topic, payload) => {
        if (topic !== TOPIC_DATA) return;
        try {
          const j = JSON.parse(payload.toString());
          if (j.temperature) elTemp.textContent = j.temperature.toFixed(1);
          if (j.humidity) elHum.textContent = j.humidity.toFixed(1);
          if (typeof j.relay === "number") setRelayUI(j.relay === 1);
          elLast.textContent = "Last: " + new Date().toLocaleTimeString();
        } catch(e) {}
      });
      client.on("close", () => setConn(false, "Offline"));
    }

    elToggle.addEventListener("click", () => {
      const next = relayState ? 0 : 1;
      setRelayUI(next);
      if (client && client.connected) {
        client.publish(TOPIC_RELAY, next ? "ON" : "OFF");
      }
    });

    connect();
  </script>
</body>
</html>
