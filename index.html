<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SYMO – Room Control (Fluo Edition)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      /* Sfondo scuro originale dalla foto */
      --bg-body: #111526;
      --bg-card-gradient: linear-gradient(180deg, rgba(30,41,71,1) 0%, rgba(21,28,49,1) 100%);
      
      /* NUOVA Palette Fluo (Verde -> Giallo) */
      --fluo-green: #39ff14; /* Verde neon puro */
      --fluo-yellow: #ccff00; /* Giallo-verde lime vibrante */
      --fluo-gradient: linear-gradient(135deg, var(--fluo-green) 0%, var(--fluo-yellow) 100%);
      
      /* Glow effect per elementi attivi */
      --fluo-glow: 0 0 15px rgba(57, 255, 20, 0.5);

      /* Testo e Bordi */
      --text-main: #ffffff;
      --text-muted: #8b9bb4;
      --border-light: rgba(255, 255, 255, 0.05);
      
      --danger: #ff4d4d;
      --success: var(--fluo-green); /* Usiamo il verde fluo per il successo */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    /* Container principale responsivo */
    .dashboard {
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* --- Top Bar --- */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 10px;
    }
    .user-info p { font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
    .user-info h1 { font-size: 20px; font-weight: 600; }
    
    .status-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.03);
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border-light);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }
    .dot.ok { background: var(--success); box-shadow: 0 0 10px var(--success); }

    /* --- Sezione Sensori --- */
    .main-stats {
      background: var(--bg-card-gradient);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      border: 1px solid var(--border-light);
    }
    .main-stats h2 { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 12px; }
    
    .stats-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
    }
    .stat-item .value { font-size: 48px; font-weight: 700; display: flex; align-items: baseline; gap: 4px; }
    .stat-item .unit { font-size: 16px; color: var(--text-muted); font-weight: 500; }
    .stat-item .label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    
    /* Applichiamo il gradiente fluo ai numeri */
    .stat-item.fluo-text .value {
      background: var(--fluo-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block; /* Necessario per il gradient text */
    }

    /* --- Sezione Dispositivi --- */
    .section-header {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: -8px;
    }
    /* Tab attiva con sfondo fluo */
    .section-header h3 { 
      font-size: 16px; 
      font-weight: 600; 
      padding: 8px 16px; 
      background: var(--fluo-gradient); 
      color: #000; /* Testo nero per contrasto sul fluo */
      border-radius: 20px; 
      box-shadow: var(--fluo-glow);
    }
    .section-header span { font-size: 14px; color: var(--text-muted); font-weight: 500; }

    .devices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
    }

    .device-card {
      background: var(--bg-card-gradient);
      border-radius: 24px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-light);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      min-height: 160px;
    }

    .device-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      color: var(--fluo-yellow); /* Icona gialla fluo */
      margin-bottom: 16px;
    }

    .device-info { margin-bottom: auto; }
    .device-info h4 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .device-info p { font-size: 12px; color: var(--text-muted); }

    .device-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }
    .device-state { font-size: 13px; font-weight: 600; color: var(--text-muted); }

    /* Toggle esatto (Fluo Edition) */
    .toggle {
      width: 44px; height: 24px;
      border-radius: 24px;
      background: #0f1629; /* Fondo scuro quando OFF */
      position: relative;
      cursor: pointer;
      transition: background 0.3s, box-shadow 0.3s;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    /* Quando ON: Sfondo diventa il gradiente fluo e aggiungiamo il glow */
    .toggle.on { 
      background: var(--fluo-gradient); 
      box-shadow: var(--fluo-glow);
      border-color: transparent;
    }
    
    .knob {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--fluo-green); /* Pomello verde fluo quando OFF */
      position: absolute;
      top: 2px; left: 3px;
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    /* Quando ON: Pomello diventa bianco e si sposta */
    .toggle.on .knob {
      left: 21px;
      background: #ffffff;
      box-shadow: -2px 0 5px rgba(0,0,0,0.2);
    }

    /* --- Meta Info --- */
    .meta-footer {
      margin-top: 20px;
      padding: 16px;
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: space-between;
      border: 1px solid var(--border-light);
    }
    .meta-footer code { background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px; color: var(--fluo-yellow); }
  </style>
</head>
<body>

  <div class="dashboard">
    
    <div class="top-bar">
      <div class="user-info">
        <p>Dashboard</p>
        <h1>Hello, SYMO</h1>
      </div>
      <div class="status-badge" onclick="connect()" title="Clicca per riconnettere">
        <div id="dot" class="dot"></div>
        <span id="connText">Disconnesso</span>
      </div>
    </div>

    <div class="main-stats">
      <h2>Ambiente Attuale</h2>
      <div class="stats-grid">
        <div class="stat-item fluo-text">
          <div class="value"><span id="temp">--.-</span> <span class="unit">°C</span></div>
          <div class="label">Temperatura</div>
        </div>
        <div class="stat-item">
          <div class="value"><span id="hum">--.-</span> <span class="unit">%</span></div>
          <div class="label">Umidità Relativa</div>
        </div>
      </div>
    </div>

    <div class="section-header">
      <h3>Devices</h3>
      <span>Rooms</span>
      <span style="margin-left:auto; color: var(--text-main);">Add +</span>
    </div>

    <div class="devices-grid">
      
      <div class="device-card">
        <div class="device-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>
        </div>
        <div class="device-info">
          <h4>Lighting</h4>
          <p>sy_room luce</p>
        </div>
        <div class="device-controls">
          <span class="device-state" id="toggleTxt">OFF</span>
          <div id="toggle" class="toggle">
            <div class="knob"></div>
          </div>
        </div>
      </div>

    </div>

    <div class="meta-footer">
      <div>Data: <code>symo/room/data</code></div>
      <div>Relay: <code>symo/room/relay</code></div>
      <div>Last msg: <code id="lastMsg">—</code></div>
    </div>

  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const MQTT_HOST = "ff68867802ae4c19875944cbd0bd6dac.s1.eu.hivemq.cloud"; 
    const MQTT_WS_PORT = 8884; 
    const MQTT_USER = "syymon";  
    const MQTT_PASS = "Piazzale99";

    const TOPIC_DATA  = "symo/room/data";
    const TOPIC_RELAY = "symo/room/relay";

    const elTemp = document.getElementById("temp");
    const elHum  = document.getElementById("hum");
    const elDot  = document.getElementById("dot");
    const elConn = document.getElementById("connText");
    const elLast = document.getElementById("lastMsg");
    const elToggle = document.getElementById("toggle");
    const elToggleTxt = document.getElementById("toggleTxt");

    let client = null;
    let relayState = 0;

    function setConn(ok, msg){
      elDot.classList.toggle("ok", !!ok);
      elConn.textContent = msg.charAt(0).toUpperCase() + msg.slice(1);
    }

    function setRelayUI(on){
      relayState = on ? 1 : 0;
      elToggle.classList.toggle("on", !!on);
      elToggleTxt.textContent = on ? "ON" : "OFF";
      // Testo ON diventa bianco brillante, OFF rimane muted
      elToggleTxt.style.color = on ? "#ffffff" : "var(--text-muted)";
    }

    function connect(){
      if (client) { try { client.end(true); } catch(e){} client = null; }

      const url = `wss://${MQTT_HOST}:${MQTT_WS_PORT}/mqtt`;
      const clientId = "symo-web-" + Math.random().toString(16).slice(2);

      setConn(false, "Connessione...");

      client = mqtt.connect(url, {
        username: MQTT_USER,
        password: MQTT_PASS,
        clientId,
        clean: true,
        connectTimeout: 8000,
        reconnectPeriod: 2000,
        keepalive: 30
      });

      client.on("connect", () => {
        setConn(true, "Connesso");
        client.subscribe(TOPIC_DATA, { qos: 0 });
      });

      client.on("reconnect", () => setConn(false, "Riconnessione..."));
      client.on("close", () => setConn(false, "Disconnesso"));
      client.on("error", (err) => setConn(false, "Errore"));

      client.on("message", (topic, payload) => {
        if (topic !== TOPIC_DATA) return;
        const s = payload.toString();
        
        const now = new Date();
        elLast.textContent = now.getHours().toString().padStart(2,'0') + ':' + 
                             now.getMinutes().toString().padStart(2,'0') + ':' + 
                             now.getSeconds().toString().padStart(2,'0');

        try{
          const j = JSON.parse(s);
          if (typeof j.temperature === "number") elTemp.textContent = j.temperature.toFixed(1);
          if (typeof j.humidity === "number")    elHum.textContent  = j.humidity.toFixed(1);
          if (typeof j.relay === "number")       setRelayUI(j.relay === 1);
        }catch(e){ }
      });
    }

    function publishRelay(cmd){
      if (!client || !client.connected) return;
      client.publish(TOPIC_RELAY, cmd, { qos: 0, retain: false });
    }

    elToggle.addEventListener("click", () => {
      const next = relayState ? 0 : 1;
      setRelayUI(next);
      publishRelay(next ? "ON" : "OFF");
    });

    connect();
  </script>
</body>
</html>
