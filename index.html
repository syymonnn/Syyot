<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SYMO</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
:root{
  --green:#39ff14;
  --yellow:#ccff00;
  --danger:#ff3d5a;
  --text:#e8f0ff;
  --muted:#5a7090;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  font-family:'Sora',sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, rgba(57,255,20,.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(204,255,0,.06), transparent 40%),
    linear-gradient(160deg,#030508 0%,#0a0f1c 40%,#030508 100%);
  overflow:hidden;
  position:relative;
}

body::after{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,.08) 2px,
    rgba(0,0,0,.08) 4px
  );
  pointer-events:none;
}

.app{
  position:relative;
  z-index:10;
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:18px;
  height:100vh;
}

.glass{
  background:rgba(8,14,30,0.55);
  backdrop-filter:blur(30px) saturate(200%);
  -webkit-backdrop-filter:blur(30px) saturate(200%);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:20px;
}

h1{
  font-size:22px;
  font-weight:800;
}

.section-title{
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:10px;
  letter-spacing:1px;
}

.value{
  font-size:52px;
  font-weight:800;
  letter-spacing:-3px;
}

.gradient-text{
  background:linear-gradient(135deg,#39ff14,#ccff00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.toggle{
  width:60px;
  height:30px;
  background:rgba(255,255,255,0.1);
  border-radius:999px;
  position:relative;
  cursor:pointer;
}

.toggle.on{
  background:linear-gradient(135deg,#39ff14,#ccff00);
  box-shadow:0 0 20px rgba(57,255,20,.4);
}

.knob{
  width:24px;
  height:24px;
  background:#fff;
  border-radius:50%;
  position:absolute;
  top:3px;
  left:3px;
  transition:.3s cubic-bezier(.68,-.55,.27,1.55);
}

.toggle.on .knob{
  left:33px;
}

/* METEO */
.wx-main{
  margin-bottom:20px;
}

.wx-temp{
  font-size:64px;
  font-weight:800;
  letter-spacing:-4px;
  background:linear-gradient(135deg,#39ff14,#ccff00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.wx-cond{
  font-size:14px;
  color:var(--muted);
  margin-top:4px;
}

.mini-map{
  height:160px;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(57,255,20,.2);
  margin-top:15px;
}

.footer{
  font-size:10px;
  color:var(--muted);
  font-family:'DM Mono',monospace;
}
</style>
</head>

<body>

<div class="app">

<div class="glass">
<h1>Hello, SYMO</h1>
</div>

<div class="glass">
<div class="section-title">Ambiente Interno</div>
<div class="value gradient-text" id="temp">--.-°</div>
<div class="value" style="font-size:32px;color:var(--muted);" id="hum">--.-%</div>
</div>

<div class="glass">
<div class="section-title">Lighting</div>
<div class="toggle" id="toggle">
<div class="knob"></div>
</div>
</div>

<div class="glass">
<div class="section-title">Meteo Locale</div>

<div class="wx-main">
<div class="wx-temp" id="wTmp">--°</div>
<div class="wx-cond" id="wCnd">Caricamento...</div>
</div>

<div class="mini-map" id="miniMap"></div>
</div>

<div class="footer">
MQTT symo/room/data · Borgomanero
</div>

</div>

<script>

/* ===== MINI MAP ===== */
const miniMap = L.map('miniMap',{
  center:[45.6855,8.4604],
  zoom:14,
  zoomControl:false,
  attributionControl:false,
  dragging:false,
  scrollWheelZoom:false
});
L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {maxZoom:19}
).addTo(miniMap);

/* ===== METEO ===== */
const LAT=45.6855;
const LON=8.4604;

async function fetchWeather(){
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current_weather=true`);
    const d=await r.json();
    const t=d.current_weather.temperature;
    const code=d.current_weather.weathercode;
    document.getElementById("wTmp").textContent=t.toFixed(1)+"°";
    document.getElementById("wCnd").textContent="Weather code "+code;
  }catch(e){
    document.getElementById("wCnd").textContent="Errore meteo";
  }
}
fetchWeather();
setInterval(fetchWeather,600000);

/* ===== MQTT ===== */
const HOST="ff68867802ae4c19875944cbd0bd6dac.s1.eu.hivemq.cloud";
const PORT=8884;
const TOPIC_DATA="symo/room/data";
const TOPIC_RELAY="symo/room/relay";

let client=null;
let relayState=0;

const tempEl=document.getElementById("temp");
const humEl=document.getElementById("hum");
const toggle=document.getElementById("toggle");

function setRelay(on){
  relayState=on?1:0;
  toggle.classList.toggle("on",on);
}

toggle.onclick=function(){
  const next=relayState?0:1;
  setRelay(next);
  if(client && client.connected){
    client.publish(TOPIC_RELAY,next?"ON":"OFF");
  }
};

function mqttConnect(){
  client=mqtt.connect(`wss://${HOST}:${PORT}/mqtt`,{
    username:"syymon",
    password:"Piazzale99",
    clientId:"symo-"+Math.random().toString(16).slice(2),
    clean:true
  });

  client.on("connect",()=>{
    client.subscribe(TOPIC_DATA);
  });

  client.on("message",(topic,payload)=>{
    if(topic!==TOPIC_DATA)return;
    try{
      const j=JSON.parse(payload.toString());
      if(j.temperature!=null){
        tempEl.textContent=j.temperature.toFixed(1)+"°";
      }
      if(j.humidity!=null){
        humEl.textContent=j.humidity.toFixed(1)+"%";
      }
      if(typeof j.relay==="number"){
        setRelay(j.relay===1);
      }
    }catch(e){}
  });
}

mqttConnect();

</script>

</body>
</html>
