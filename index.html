<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Syyroom</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
  --bg-body:#080b16;
  --glass-bg:rgba(255,255,255,0.04);
  --glass-border:rgba(255,255,255,0.08);
  --fluo-green:#39ff14;
  --fluo-yellow:#ccff00;
  --fluo-gradient:linear-gradient(135deg,var(--fluo-green),var(--fluo-yellow));
  --fluo-glow:0 0 20px rgba(57,255,20,0.4);
  --text-main:#ffffff;
  --text-muted:#8b9bb4;
  --danger:#ff4d4d;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Inter',system-ui;
  background-color:var(--bg-body);
  background-image:
    radial-gradient(circle at 10% 10%,#1a2344 0%,transparent 40%),
    radial-gradient(circle at 90% 90%,#0d1225 0%,transparent 40%);
  color:var(--text-main);
  min-height:100vh;
  padding:20px;
  display:flex;
  justify-content:center;
}

.dashboard{
  width:100%;
  max-width:900px;
  display:flex;
  flex-direction:column;
  gap:30px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status-badge{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--glass-bg);
  backdrop-filter:blur(15px);
  padding:10px 16px;
  border-radius:20px;
  font-size:12px;
  border:1px solid var(--glass-border);
  cursor:pointer;
}

.dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--danger);
}
.dot.ok{
  background:var(--fluo-green);
  box-shadow:0 0 10px var(--fluo-green);
}

.main-stats{
  background:var(--glass-bg);
  backdrop-filter:blur(30px);
  border-radius:32px;
  padding:30px;
  border:1px solid var(--glass-border);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.main-stats h2{
  font-size:14px;
  color:var(--text-muted);
  margin-bottom:20px;
  text-transform:uppercase;
  letter-spacing:1px;
}

.env-tabs{
  position:relative;
  display:flex;
  gap:10px;
  margin-bottom:25px;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px 0;
  border-radius:16px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  color:var(--text-muted);
  position:relative;
  z-index:2;
}

.tab.active{color:#000;}

.tab-glow{
  position:absolute;
  height:100%;
  width:50%;
  background:var(--fluo-gradient);
  border-radius:16px;
  top:0;
  left:0;
  transition:0.35s cubic-bezier(.6,.2,.2,1);
  box-shadow:var(--fluo-glow);
  z-index:1;
}

.stats-wrapper{position:relative;overflow:hidden;}

.stats-grid{
  display:flex;
  gap:40px;
  transition:0.4s;
  opacity:0;
  transform:translateY(10px);
  position:absolute;
  width:100%;
}

.stats-grid.active{
  opacity:1;
  transform:translateY(0);
  position:relative;
}

.stat-item .value{
  font-size:56px;
  font-weight:700;
  display:flex;
  align-items:baseline;
  gap:6px;
  letter-spacing:-2px;
}

.stat-item .unit{
  font-size:20px;
  color:var(--text-muted);
}

.stat-item .label{
  font-size:14px;
  color:var(--text-muted);
}

.stat-item.fluo-text .value{
  background:var(--fluo-gradient);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.devices-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.device-card{
  background:var(--glass-bg);
  backdrop-filter:blur(20px);
  border-radius:32px;
  padding:24px;
  border:1px solid var(--glass-border);
  min-height:200px;
  display:flex;
  flex-direction:column;
}

.toggle{
  width:60px;height:32px;border-radius:30px;
  background:rgba(255,255,255,0.1);
  position:relative;
  cursor:pointer;
  border:1px solid var(--glass-border);
  transition:0.3s;
}

.toggle.on{
  background:var(--fluo-gradient);
  box-shadow:var(--fluo-glow);
}

.knob{
  width:24px;height:24px;border-radius:50%;
  background:#fff;
  position:absolute;
  top:3px;left:4px;
  transition:0.3s cubic-bezier(.68,-0.55,.265,1.55);
}

.toggle.on .knob{left:30px;}
</style>
</head>

<body>
<div class="dashboard">

<div class="top-bar">
  <h1>Hello, Symo</h1>
  <div class="status-badge" onclick="connect()">
    <div id="dot" class="dot"></div>
    <span id="connText">Disconnesso</span>
  </div>
</div>

<div class="main-stats">
<h2>Ambiente</h2>

<div class="env-tabs">
  <div class="tab active" data-tab="inside">Interno</div>
  <div class="tab" data-tab="outside">Esterno</div>
  <div class="tab-glow"></div>
</div>

<div class="stats-wrapper">

<div class="stats-grid inside active">
  <div class="stat-item fluo-text">
    <div class="value"><span id="temp">--.-</span><span class="unit">°C</span></div>
    <div class="label">Temperatura</div>
  </div>
  <div class="stat-item">
    <div class="value"><span id="hum">--.-</span><span class="unit">%</span></div>
    <div class="label">Umidità</div>
  </div>
</div>

<div class="stats-grid outside">
  <div class="stat-item fluo-text">
    <div class="value"><span id="extTemp">--.-</span><span class="unit">°C</span></div>
    <div class="label">Temperatura Esterna</div>
  </div>
  <div class="stat-item">
    <div class="value"><span id="extHum">--.-</span><span class="unit">%</span></div>
    <div class="label">Umidità Esterna</div>
  </div>
</div>

</div>
</div>

<div class="devices-grid">
<div class="device-card">
  <h4>Lighting</h4>
  <div class="toggle" id="toggle"><div class="knob"></div></div>
</div>
</div>

</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
const MQTT_HOST="ff68867802ae4c19875944cbd0bd6dac.s1.eu.hivemq.cloud";
const MQTT_WS_PORT=8884;
const MQTT_USER="syymon";
const MQTT_PASS="Piazzale99";
const TOPIC_DATA="symo/room/data";
const TOPIC_RELAY="symo/room/relay";

const LAT=45.4642;
const LON=9.1900;

let client=null;
let relayState=0;

function connect(){
if(client){client.end(true);}
client=mqtt.connect(`wss://${MQTT_HOST}:${MQTT_WS_PORT}/mqtt`,{
username:MQTT_USER,password:MQTT_PASS,
clientId:"symo-web-"+Math.random().toString(16).slice(2)
});
client.on("connect",()=>{
document.getElementById("dot").classList.add("ok");
document.getElementById("connText").innerText="Connesso";
client.subscribe(TOPIC_DATA);
});
client.on("message",(t,p)=>{
if(t!==TOPIC_DATA)return;
const j=JSON.parse(p.toString());
if(j.temperature)temp.innerText=j.temperature.toFixed(1);
if(j.humidity)hum.innerText=j.humidity.toFixed(1);
if(typeof j.relay==="number")setRelay(j.relay===1);
});
}

function setRelay(on){
relayState=on?1:0;
toggle.classList.toggle("on",on);
}

toggle.onclick=()=>{
const next=relayState?0:1;
setRelay(next);
if(client&&client.connected){
client.publish(TOPIC_RELAY,next?"ON":"OFF");
}
};

async function fetchWeather(){
const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current_weather=true&hourly=relativehumidity_2m`);
const d=await r.json();
extTemp.innerText=d.current_weather.temperature.toFixed(1);
extHum.innerText=d.hourly.relativehumidity_2m[0];
}
fetchWeather();
setInterval(fetchWeather,600000);

const tabs=document.querySelectorAll(".tab");
const inside=document.querySelector(".inside");
const outside=document.querySelector(".outside");
const glow=document.querySelector(".tab-glow");

tabs.forEach(tab=>{
tab.onclick=()=>{
tabs.forEach(t=>t.classList.remove("active"));
tab.classList.add("active");
if(tab.dataset.tab==="inside"){
inside.classList.add("active");
outside.classList.remove("active");
glow.style.left="0%";
}else{
outside.classList.add("active");
inside.classList.remove("active");
glow.style.left="50%";
}
};
});

connect();
</script>
</body>
</html>
